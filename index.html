
<!DOCTYPE html>
<html>
<head>
<title>Zyron</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{margin:0;font-family:Poppins;background:#000;color:#fff}
header{display:flex;justify-content:space-between;padding:15px 30px;background:#050505}
header h2{color:#00d4ff}
.hero{text-align:center;padding:80px 20px}
.hero h1{color:#00d4ff;font-size:45px}
.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;padding:20px}
.card{background:#111;padding:20px;border-radius:10px;text-align:center;transition:0.3s}
.card:hover{box-shadow:0 0 20px #00d4ff;transform:scale(1.05)}
footer{text-align:center;padding:20px;background:#050505}
</style>
</head>

<body>

<header>
<h2>Zyron</h2>
<div>Home | Products | Contact</div>
</header>

<div class="hero">
<h1>BUILD THE FUTURE 🚀</h1>
<p>Zyron & Chairox Official Website</p>
</div>

<div class="products">
<div class="card"><h3>Zyron Tech</h3></div>
<div class="card"><h3>Zyron Store</h3></div>
<div class="card"><h3>Zyron Trading</h3></div>
<div class="card"><h3>Zyron Academy</h3></div>
<div class="card"><h3>Zyron Labs</h3></div>
<div class="card"><h3>Chairox</h3></div>
</div>

<footer>
© 2026 Zyron
</footer>

</body>
</html>
